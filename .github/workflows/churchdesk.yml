name: Build and Push Docker image

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 📥
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Lowercase image name
        shell: bash
        run: |
          echo "LOWERCASE_IMAGENAME=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name:  Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          push: true
          file: Dockerfile
          tags: |
            ghcr.io/${{ env.LOWERCASE_IMAGENAME }}:latest
            ghcr.io/${{ env.LOWERCASE_IMAGENAME }}:${{ github.ref_name }}
          cache-from: type=registry,ref=ghcr.io/${{ env.LOWERCASE_IMAGENAME }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.LOWERCASE_IMAGENAME }}:buildcache,mode=max